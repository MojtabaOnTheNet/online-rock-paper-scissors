services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:8
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  redis-data:
