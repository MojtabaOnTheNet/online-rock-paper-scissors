services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      - redis
    volumes:
      - ./backend:/app/backend
      - /app/backend/node_modules
    develop:
      watch:
        - path: ./backend
          action: rebuild

  redis:
    image: redis:8
    ports:
      - "6379:6379"
