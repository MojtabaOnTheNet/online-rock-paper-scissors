<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Online RPS</title>
    <link href="./output.css" rel="stylesheet" />
    <script src="/socket.io/socket.io.js"></script>
    <script defer src="./index.js"></script>
  </head>
  <body
    class="min-h-screen bg-linear-to-br from-slate-900 via-indigo-950 to-slate-950 flex items-center justify-center"
  >
    <div
      id="home-screen"
      class="w-175 h-95 screen bg-slate-800/70 backdrop-blur-xl rounded-3xl border border-slate-700 shadow-2xl flex flex-col items-center justify-center gap-10"
    >
      <h1 class="text-5xl font-bold text-white tracking-wide">
        Rock Paper Scissors
      </h1>

      <p class="text-slate-300 text-lg">
        Create a room or join an existing one.
      </p>

      <div class="flex gap-8">
        <button
          class="px-14 py-5 rounded-2xl bg-emerald-500 text-white text-2xl font-semibold shadow-lg hover:bg-emerald-400 hover:scale-105 active:scale-95 transition-all duration-200 cursor-pointer"
          id="host"
        >
          🎮 Host
        </button>

        <button
          class="px-14 py-5 rounded-2xl bg-violet-600 text-white text-2xl font-semibold shadow-lg hover:bg-violet-500 hover:scale-105 active:scale-95 transition-all duration-200 cursor-pointer"
          id="join"
        >
          🚀 Join
        </button>
      </div>
    </div>
    <div
      id="host-screen"
      class="hidden screen h-screen w-full bg-linear-to-br from-slate-900 via-indigo-950 to-slate-950 items-center justify-center"
    >
      <div
        class="w-175 rounded-3xl bg-slate-800/70 backdrop-blur-xl border border-slate-700 shadow-2xl p-12 flex flex-col items-center gap-8"
      >
        <h1 class="text-4xl font-bold text-white">Room Created</h1>

        <p class="text-slate-300 text-lg">Share this code with your friend</p>

        <div
          id="room-code"
          class="w-full py-6 rounded-2xl bg-slate-900 border-2 border-indigo-500 text-center text-6xl font-black tracking-[0.4em] text-indigo-400 select-all"
        >
          X4P8KD
        </div>

        <button
          id="copy-btn"
          class="px-10 py-4 rounded-xl bg-indigo-600 text-white text-xl font-semibold shadow-lg hover:bg-indigo-500 hover:scale-105 active:scale-95 transition-all duration-200 cursor-pointer"
        >
          📋 Copy Code
        </button>

        <div class="flex items-center gap-3 text-emerald-400 text-lg">
          <div class="w-3 h-3 rounded-full bg-emerald-400 animate-pulse"></div>
          Waiting for opponent...
        </div>

        <button
          id="cancel"
          class="mt-4 px-8 py-3 rounded-xl bg-red-500 text-white font-semibold hover:bg-red-400 transition cursor-pointer"
        >
          Cancel
        </button>
      </div>
    </div>
    <div
      id="join-screen"
      class="hidden screen h-screen w-full bg-linear-to-br from-slate-900 via-indigo-950 to-slate-950 items-center justify-center"
    >
      <div
        class="w-175 rounded-3xl bg-slate-800/70 backdrop-blur-xl border border-slate-700 shadow-2xl p-12 flex flex-col items-center gap-8"
      >
        <h1 class="text-4xl font-bold text-white">Join a Room</h1>

        <p class="text-slate-300 text-lg">
          Enter the room code your friend shared with you.
        </p>

        <input
          id="room-input"
          type="text"
          maxlength="6"
          placeholder="ABC123"
          autocomplete="off"
          spellcheck="false"
          class="w-full bg-slate-900 border-2 border-slate-600 rounded-2xl py-5 px-6 text-center text-5xl font-black tracking-[0.4em] uppercase text-white placeholder:text-slate-500 focus:border-violet-500 focus:outline-none transition"
        />

        <button
          id="join-room-btn"
          class="w-full py-4 rounded-2xl bg-violet-600 text-white text-2xl font-semibold shadow-lg hover:bg-violet-500 hover:scale-[1.02] active:scale-95 transition-all duration-200 cursor-pointer"
        >
          🚀 Join Room
        </button>

        <p id="join-error" class="hidden text-red-400 text-lg font-medium">
          Invalid room code.
        </p>

        <button
          id="back"
          class="mt-2 px-8 py-3 rounded-xl bg-slate-700 text-slate-200 font-semibold hover:bg-slate-600 transition cursor-pointer"
        >
          ← Back
        </button>
      </div>
    </div>
  </body>
</html>
